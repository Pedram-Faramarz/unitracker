<div class="modal-overlay" (click)="cancelled.emit()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2 class="modal-title">{{ principle ? 'Edit Principle' : 'New Principle' }}</h2>

    <!-- Server error -->
    <div class="form-error" style="margin-bottom:12px" *ngIf="errorMsg()">
      ⚠ {{ errorMsg() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Name *</label>
        <input class="form-input" formControlName="name"
               placeholder="e.g. Calculus, Physics I…" autofocus>
        <span class="form-error"
              *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
          Name is required (max 200 characters)
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Description <span class="optional">(optional)</span></label>
        <textarea class="form-input" formControlName="description"
                  rows="2" placeholder="Notes about this subject…"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Semester <span class="optional">(optional)</span></label>
        <select class="form-input" formControlName="semester">
          <option value="">— None —</option>
          <option *ngFor="let s of semesters" [value]="s">{{ s }}</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-row">
          <div class="color-swatch"
               *ngFor="let c of colors"
               [style.background]="c"
               [class.selected]="selectedColor() === c"
               (click)="selectedColor.set(c)">
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" (click)="cancelled.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="loading() || form.invalid">
          {{ loading() ? 'Saving…' : (principle ? 'Save Changes' : 'Create') }}
        </button>
      </div>
    </form>
  </div>
</div>
