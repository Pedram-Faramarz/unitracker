<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Uni<span>Track</span></div>
    <h2>Sign in</h2>
    <p class="auth-sub">Track your academic progress</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" formControlName="email" placeholder="you@university.edu" autocomplete="email">
        <span class="form-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password">
        <span class="form-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password is required
        </span>
      </div>

      <button class="btn btn-primary btn-full" type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>
  </div>
</div>
